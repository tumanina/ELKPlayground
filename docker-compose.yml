services:
  elkplayground.elasticsearch:
    image: ${DOCKER_REGISTRY-}elkplaygroundelasticsearch
    build:
      context: ELKPlayground.ElasticSearch
      dockerfile: Dockerfile
    networks:
      - es-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.4
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ELASTIC_PASSWORD='123456test'
    ports:
      - "9200:9200"
    networks:
      - es-network
    volumes:
      - esdata:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.4
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - 5601:5601
    networks:
      - es-network
    depends_on:
      - elasticsearch

volumes:
  esdata:
    driver: local

networks:
  es-network:
    driver: bridge